<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<title>Каталог — VINOTEKA34</title>

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<header class="header">

<a class="logo" href="/index.html">
VINOTEKA34
</a>

<nav>

<a href="/index.html">Главная</a>
<a href="/catalog.html">Каталог</a>
<a href="#">Дегустации</a>
<a href="#">Контакты</a>

</nav>

</header>


<div class="catalogPage">




<!-- SIDEBAR -->

<aside class="sidebar">

<h2>Каталог</h2>

<input
id="searchInput"
type="text"
placeholder="Поиск вина..."
onkeyup="searchProducts()"
>




<h3>Категории</h3>

<div class="categories">

<button onclick="filterCategory('all')">Все</button>

<button onclick="filterCategory('wine')">
Вино
</button>

<button onclick="filterCategory('sparkling')">
Игристое
</button>

<button onclick="filterCategory('strong')">
Крепкий алкоголь
</button>

<button onclick="filterCategory('beer')">
Пиво
</button>

<button onclick="filterCategory('soft')">
Безалкогольные
</button>

<button onclick="filterCategory('grocery')">
Бакалея
</button>

<button onclick="filterCategory('tea')">
Чай
</button>

<button onclick="filterCategory('accessories')">
Аксессуары
</button>

</div>



<h3>Цвет</h3>

<select id="colorFilter">

<option value="all">Все</option>
<option value="красное">Красное</option>
<option value="белое">Белое</option>
<option value="розовое">Розовое</option>

</select>




<h3>Стиль</h3>

<select id="styleFilter">

<option value="all">Все</option>
<option value="сухое">Сухое</option>
<option value="полусухое">Полусухое</option>
<option value="полусладкое">Полусладкое</option>
<option value="сладкое">Сладкое</option>

</select>




<h3>Страна</h3>

<select id="countryFilter">

<option value="all">Все</option>

</select>


</aside>





<!-- CATALOG -->

<main class="catalog">

<div id="catalogGrid" class="catalogGrid">

</div>

</main>




</div>




<script src="/catalog.js"></script>

</body>

</html>
