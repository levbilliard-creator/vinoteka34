<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Винотека — Каталог</title>

<link rel="stylesheet" href="/styles.css">

<style>

.catalog-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#111;
border:1px solid #2a2a2a;
border-radius:12px;
padding:20px;
color:white;
display:flex;
flex-direction:column;
gap:10px;
}

.title-en{
font-weight:700;
font-size:16px;
}

.title-ru{
opacity:0.7;
font-size:14px;
}

.meta{
opacity:0.6;
font-size:13px;
}

.price{
font-size:22px;
font-weight:700;
margin-top:10px;
}

.open-btn{
margin-top:10px;
padding:8px 14px;
border-radius:8px;
border:1px solid #444;
background:#1b1b1b;
color:white;
cursor:pointer;
}

.tags{
margin-top:10px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

.tag{
font-size:12px;
padding:4px 8px;
border-radius:20px;
border:1px solid #444;
}

</style>

</head>

<body>

<header class="top">

<div class="container">

<h1>ВИНОТЕКА</h1>

</div>

</header>


<main class="section">

<div class="container">

<h1>Каталог</h1>

<p>
Цены на сайте • Откройте карточку товара кликом по названию
</p>

<div id="catalog" class="catalog-grid"></div>

</div>

</main>


<script src="/catalog.js"></script>

</body>

</html>
