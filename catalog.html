<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Каталог — VINOTEKA34</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>


<body>

<header class="header">

<div class="logo">
VINOTEKA34
</div>

<nav class="menu">

<a href="/">Главная</a>
<a href="/catalog">Каталог</a>
<a href="#">Дегустации</a>
<a href="#">Контакты</a>

</nav>

<div class="phone">
+7 495 947-10-10
</div>

</header>


<section class="catalog-page">

<div class="catalog-header">

<h1>Каталог</h1>

<input
type="text"
placeholder="Поиск вина..."
id="search"
class="search"
/>

</div>


<div class="catalog-layout">


<aside class="filters">

<h3>Категории</h3>

<button class="filter-btn active" data-cat="all">Все</button>
<button class="filter-btn" data-cat="wine">Вино</button>
<button class="filter-btn" data-cat="sparkling">Игристое</button>
<button class="filter-btn" data-cat="strong">Крепкий алкоголь</button>
<button class="filter-btn" data-cat="food">Бакалея</button>
<button class="filter-btn" data-cat="tea">Чай</button>

</aside>


<div id="catalog-grid" class="catalog-grid">

</div>


</div>

</section>


<script src="/catalog.js"></script>

</body>

</html>
