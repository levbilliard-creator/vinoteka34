<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Каталог — Винотека</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <div class="logo">ВИНОТЕКА</div>

  <a href="tel:+74959471010" class="phone-block">
    <span class="phone-number">+7 (495) 947-10-10</span>
    <span class="phone-icon">📞</span>
  </a>
</header>


<section class="catalog-page">

  <!-- ЛЕВАЯ КОЛОНКА -->
  <aside class="sidebar">

    <h2>Каталог</h2>

    <input id="searchInput" placeholder="Поиск вина..." />

    <div class="categories">
      <button data-type="all" class="active">Все</button>
      <button data-type="wine">Вино</button>
      <button data-type="sparkling">Игристое</button>
      <button data-type="strong">Крепкий алкоголь</button>
      <button data-type="beer">Пиво</button>
      <button data-type="soft">Безалкогольные</button>
      <button data-type="grocery">Бакалея</button>
      <button data-type="tea">Чай</button>
      <button data-type="accessories">Аксессуары</button>
    </div>

  </aside>


  <!-- СЕТКА -->
  <main class="catalog-content">
    <div class="catalogGrid"></div>
  </main>

</section>

<script src="catalog.js"></script>

</body>
</html>
