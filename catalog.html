<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<title>Каталог — Винотека</title>

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<header class="header">

<div class="logo">ВИНОТЕКА</div>

<nav class="menu">

<a href="/">Бутик</a>
<a href="#">Клуб</a>
<a href="#">Сомелье</a>
<a href="/catalog">Каталог</a>
<a href="#">Дегустации</a>
<a href="#">Контакты</a>

</nav>

<div class="phone">
+7 495 947-10-10
</div>

</header>


<section class="catalog">

<h1 class="catalog-title">
Каталог напитков
</h1>


<input
class="search"
placeholder="Поиск вина..."
id="search"
/>


<div class="filters">

<button class="filter-btn active" data-filter="all">
Все
</button>

<button class="filter-btn" data-filter="wine">
Вино
</button>

<button class="filter-btn" data-filter="sparkling">
Игристое
</button>

<button class="filter-btn" data-filter="spirits">
Крепкий алкоголь
</button>

<button class="filter-btn" data-filter="tea">
Чай
</button>

<button class="filter-btn" data-filter="grocery">
Бакалея
</button>

<button class="filter-btn" data-filter="accessories">
Аксессуары
</button>

</div>


<div class="catalog-grid" id="catalog-grid">
</div>


</section>

<script src="/catalog.js"></script>

</body>
</html>
