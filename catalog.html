<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<title>Каталог вин</title>

</head>

<body>

<header class="header">

<a href="/" class="logo">ВИНОТЕКА</a>

<nav class="menu">

</nav>

<div class="phone">+7 495 947-10-10</div>

<section class="catalog">

</h1>

class="search"

>

</section>

<script src="/catalog.js"></script>
