```html
<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Каталог — Винотека</title>

<link rel="stylesheet" href="/styles.css">

<style>

.catalogPage{
max-width:1400px;
margin:40px auto;
padding:0 40px;
display:grid;
grid-template-columns:260px 1fr;
gap:40px;
}

.catalogSidebar input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:20px;
}

.catalogSidebar h3{
margin-bottom:10px;
}

.cat-btn{
display:block;
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#e5e5e5;
cursor:pointer;
}

.catalogGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:28px;
}

</style>

</head>

<body>

<header class="header">

<div class="logo">
ВИНОТЕКА
</div>

<nav class="menu">
<a href="/">Главная</a>
<a href="/catalog">Каталог</a>
<a href="#">Дегустации</a>
<a href="#">Контакты</a>
</nav>

</header>

<div class="catalogPage">

<aside class="catalogSidebar">

<h2>Каталог</h2>

<input placeholder="Поиск вина...">

<h3>Категории</h3>

<button class="cat-btn" data-cat="all">Все</button>
<button class="cat-btn" data-cat="wine">Вино</button>
<button class="cat-btn" data-cat="sparkling">Игристое</button>
<button class="cat-btn" data-cat="strong">Крепкий алкоголь</button>
<button class="cat-btn" data-cat="beer">Пиво</button>
<button class="cat-btn" data-cat="soft">Безалкогольные</button>
<button class="cat-btn" data-cat="grocery">Бакалея</button>
<button class="cat-btn" data-cat="tea">Чай</button>
<button class="cat-btn" data-cat="accessories">Аксессуары</button>

</aside>

<main>

<div id="catalogGrid" class="catalogGrid"></div>

</main>

</div>

<script src="/catalog.js"></script>

</body>
</html>
```
