<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>Каталог — Vinoteka34</title>

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<header class="header">

<a class="logo" href="/index.html">
VINOTEKA34
</a>

<nav>

<a href="/index.html">Главная</a>
<a href="/catalog.html">Каталог</a>

</nav>

<div class="catalogPage">




<!-- ЛЕВАЯ ПАНЕЛЬ -->

<h2>Каталог</h2>

<input
id="searchInput"
type="text"
placeholder="Поиск вина..."
onkeyup="search()"
>



<h3>Категории</h3>

<div class="categories">

<button onclick="filterCategory('all')">Все</button>

<button onclick="filterCategory('wine')">
Вино
</button>

<button onclick="filterCategory('sparkling')">
Игристое
</button>

<button onclick="filterCategory('strong')">
Крепкий алкоголь
</button>

<button onclick="filterCategory('beer')">
Пиво
</button>

<button onclick="filterCategory('soft')">
Безалкогольные
</button>

<button onclick="filterCategory('grocery')">
Бакалея
</button>

<button onclick="filterCategory('tea')">
Чай
</button>

<button onclick="filterCategory('accessories')">
Аксессуары
</button>

</div>



<h3>Цвет</h3>

<select>

<option>Все</option>
<option>Красное</option>
<option>Белое</option>
<option>Розовое</option>

</select>



<h3>Стиль</h3>

<select>

<option>Все</option>
<option>Сухое</option>
<option>Полусухое</option>
<option>Сладкое</option>

</select>



<h3>Страна</h3>

<select>

<option>Все</option>

</select>



</aside>




<!-- КАТАЛОГ -->

<main class="catalog">

<div
id="catalogGrid"
class="catalogGrid"
>

</div>

</main>

</div>
