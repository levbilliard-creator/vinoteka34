<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Каталог — Vinoteka34</title>

<link rel="stylesheet" href="styles.css">

</head>


<body>

<header class="header">

<div class="logo">
<a href="index.html">VINOTEKA34</a>
</div>

<nav class="nav">

<a href="index.html">Главная</a>
<a href="catalog.html">Каталог</a>
<a href="#">Дегустации</a>
<a href="#">Контакты</a>

</nav>

<div class="phone">
+7 495 947-10-10
</div>

</header>



<main class="catalog-page">

<div class="catalog-container">

<h1>Каталог</h1>

<input
id="search"
class="catalog-search"
type="text"
placeholder="Поиск вина..."
>



<div class="catalog-layout">


<!-- SIDEBAR -->

<aside class="catalog-sidebar">

<h3>Категории</h3>

<div class="catalog-categories">

<button data-filter="all">Все</button>
<button data-filter="wine">Вино</button>
<button data-filter="sparkling">Игристое</button>
<button data-filter="strong">Крепкий алкоголь</button>
<button data-filter="grocery">Бакалея</button>
<button data-filter="tea">Чай</button>

</div>


<h3>Цвет</h3>

<select id="filter-color">

<option value="">Все</option>
<option value="red">Красное</option>
<option value="white">Белое</option>
<option value="rose">Розовое</option>

</select>


<h3>Стиль</h3>

<select id="filter-style">

<option value="">Все</option>
<option value="dry">Сухое</option>
<option value="semi-dry">Полусухое</option>
<option value="semi-sweet">Полусладкое</option>
<option value="sweet">Сладкое</option>

</select>


<h3>Страна</h3>

<select id="filter-country">

<option value="">Все</option>
<option value="france">Франция</option>
<option value="italy">Италия</option>
<option value="spain">Испания</option>
<option value="russia">Россия</option>

</select>

</aside>


<!-- CATALOG -->

<section class="catalog-content">

<div id="catalog-grid" class="catalog-grid"></div>

</section>


</div>
</div>

</main>


<script src="catalog.js"></script>

</body>
</html>
