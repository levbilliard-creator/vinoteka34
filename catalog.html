<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Каталог — VINOTEKA34</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">

<div class="logo">
VINOTEKA34
</div>

<nav class="menu">

<a href="/">Главная</a>
<a href="/catalog">Каталог</a>
<a href="#">Дегустации</a>
<a href="#">Контакты</a>

</nav>

<div class="phone">
+7 495 947-10-10
</div>

</header>


<section class="catalog-page">

<h1 class="catalog-title">
Каталог
</h1>


<input
class="search-input"
placeholder="Поиск вина..."
id="search"
/>


<div class="catalog-layout">


<div class="filters">

<h3>Категории</h3>

<div class="filter-group">

<label>
<input type="checkbox" value="wine" class="category">
Вино
</label>

<label>
<input type="checkbox" value="sparkling" class="category">
Игристое
</label>

<label>
<input type="checkbox" value="strong" class="category">
Крепкий алкоголь
</label>

<label>
<input type="checkbox" value="food" class="category">
Бакалея
</label>

<label>
<input type="checkbox" value="tea" class="category">
Чай
</label>

</div>


<h3>Цвет вина</h3>

<div class="filter-group">

<label>
<input type="checkbox" value="red" class="color">
Красное
</label>

<label>
<input type="checkbox" value="white" class="color">
Белое
</label>

<label>
<input type="checkbox" value="rose" class="color">
Розовое
</label>

</div>


<h3>Страна</h3>

<div class="filter-group">

<label>
<input type="checkbox" value="france" class="country">
Франция
</label>

<label>
<input type="checkbox" value="italy" class="country">
Италия
</label>

<label>
<input type="checkbox" value="spain" class="country">
Испания
</label>

<label>
<input type="checkbox" value="russia" class="country">
Россия
</label>

</div>


<h3>Цена</h3>

<div class="filter-group">

<label>
<input type="radio" name="price" value="3000">
до 3000 ₽
</label>

<label>
<input type="radio" name="price" value="6000">
до 6000 ₽
</label>

<label>
<input type="radio" name="price" value="10000">
до 10000 ₽
</label>

</div>


</div>


<div class="catalog-grid" id="catalog-grid">

<!-- карточки товаров появляются здесь -->

</div>


</div>

</section>


<script src="catalog_v6.js"></script>

</body>

</html>
