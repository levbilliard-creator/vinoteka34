<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Каталог — VINOTEKA34</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">

<div class="logo">
VINOTEKA34
</div>

<nav class="menu">

<a href="/">Главная</a>
<a href="/catalog">Каталог</a>
<a href="#">Дегустации</a>
<a href="#">Контакты</a>

</nav>

<div class="phone">
+7 495 947-10-10
</div>

</header>



<section class="catalog-page">

<h1 class="catalog-title">
Каталог
</h1>


<input
class="search-input"
placeholder="Поиск вина..."
id="search"
/>


<div class="catalog-layout">


<div class="filters">

<h3>Категории</h3>

<div class="filter-group">

<button data-filter="all">Все</button>
<button data-filter="wine">Вино</button>
<button data-filter="sparkling">Игристое</button>
<button data-filter="strong">Крепкий алкоголь</button>
<button data-filter="food">Бакалея</button>
<button data-filter="tea">Чай</button>

</div>


<h3>Цвет</h3>

<div class="filter-group">

<button data-color="red">Красное</button>
<button data-color="white">Белое</button>
<button data-color="rose">Розовое</button>

</div>


<h3>Цена</h3>

<div class="filter-group">

<button data-price="3000">до 3000</button>
<button data-price="6000">до 6000</button>
<button data-price="10000">до 10000</button>

</div>


</div>



<div class="catalog-grid" id="catalog-grid"></div>


</div>

</section>


<script src="catalog_v5.js"></script>

</body>
</html>
