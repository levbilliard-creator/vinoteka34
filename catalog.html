<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Каталог — Vinoteka34</title>

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<header class="header">

<div class="header-logo">
<a href="/index.html">VINOTEKA34</a>
</div>

<nav class="header-menu">
<a href="/index.html">Главная</a>
<a href="/catalog.html">Каталог</a>
<a href="#">Дегустации</a>
<a href="#">Контакты</a>
</nav>

<div class="header-phone">
+7 495 947-10-10
</div>

</header>


<main class="catalog-page">

<div class="catalog-layout">

<!-- SIDEBAR -->

<aside class="catalog-sidebar">

<h1>Каталог</h1>

<input id="search" type="text" placeholder="Поиск вина...">


<div class="filter-box">

<h3>Категории</h3>

<div class="category-buttons">

<button data-filter="all">Все</button>
<button data-filter="wine">Вино</button>
<button data-filter="sparkling">Игристое</button>
<button data-filter="strong">Крепкий алкоголь</button>
<button data-filter="grocery">Бакалея</button>
<button data-filter="tea">Чай</button>

</div>

<h3>Цвет</h3>

<select>
<option>Все</option>
<option>Красное</option>
<option>Белое</option>
<option>Розовое</option>
</select>

<h3>Стиль</h3>

<select>
<option>Все</option>
<option>Сухое</option>
<option>Полусухое</option>
<option>Полусладкое</option>
<option>Сладкое</option>
</select>

<h3>Страна</h3>

<select>
<option>Все</option>
<option>Франция</option>
<option>Италия</option>
<option>Испания</option>
<option>Россия</option>
</select>

</div>

</aside>


<!-- GRID -->

<section id="catalog-grid" class="catalog-grid">

<!-- карточки сюда вставляет JS -->

</section>


</div>

</main>


<script src="/catalog.js"></script>

</body>

</html>
