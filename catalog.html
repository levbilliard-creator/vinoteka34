<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Каталог вин</title>

<link rel="stylesheet" href="styles.css">

<style>

.catalog-controls{
display:flex;
gap:20px;
margin:30px 0;
flex-wrap:wrap;
}

.catalog-controls input,
.catalog-controls select{

padding:10px 12px;
border-radius:6px;
border:1px solid #333;
background:#14181f;
color:white;

}

</style>

</head>

<body>

<header class="header">

<div class="container header-inner">

<div class="logo">
ВИНОТЕКА
</div>

<nav class="nav">

<a href="index.html">Главная</a>
<a href="#">Бутик</a>
<a href="#">Клуб</a>
<a href="#">Сомелье</a>
<a href="catalog.html">Каталог</a>
<a href="#">Контакты</a>

</nav>

</div>

</header>


<main>

<section class="section">

<div class="container">

<h1>Каталог вин</h1>


<div class="catalog-controls">

<input
id="search"
placeholder="Поиск вина..."
>

<select id="filter">

<option value="all">Все</option>
<option value="red">Красное</option>
<option value="white">Белое</option>
<option value="sparkling">Игристое</option>

</select>

<select id="sort">

<option value="default">Сортировка</option>
<option value="price_low">Цена ↑</option>
<option value="price_high">Цена ↓</option>

</select>

</div>


<div
id="catalog"
class="catalog-grid"
></div>

</div>

</section>

</main>


<script>

const wines = [

{ name:"Chateau Bordeaux", type:"red", country:"Франция", price:2900, img:"assets/img/wine1.jpg" },

{ name:"Chianti Classico", type:"red", country:"Италия", price:2500, img:"assets/img/wine2.jpg" },

{ name:"Riesling Mosel", type:"white", country:"Германия", price:2300, img:"assets/img/wine3.jpg" },

{ name:"Pinot Noir", type:"red", country:"Франция", price:3100, img:"assets/img/wine4.jpg" },

{ name:"Sauvignon Blanc", type:"white", country:"Новая Зеландия", price:2700, img:"assets/img/wine5.jpg" },

{ name:"Rioja Reserva", type:"red", country:"Испания", price:2600, img:"assets/img/wine6.jpg" },

{ name:"Prosecco DOC", type:"sparkling", country:"Италия", price:2100, img:"assets/img/wine7.jpg" },

{ name:"Malbec Mendoza", type:"red", country:"Аргентина", price:2400, img:"assets/img/wine8.jpg" },

{ name:"Chardonnay", type:"white", country:"Франция", price:2800, img:"assets/img/wine9.jpg" },

{ name:"Barolo", type:"red", country:"Италия", price:4900, img:"assets/img/wine10.jpg" },

{ name:"Gewürztraminer", type:"white", country:"Германия", price:2300, img:"assets/img/wine11.jpg" },

{ name:"Champagne Brut", type:"sparkling", country:"Франция", price:5900, img:"assets/img/wine12.jpg" }

]


const catalog = document.getElementById("catalog")
const search = document.getElementById("search")
const filter = document.getElementById("filter")
const sort = document.getElementById("sort")


function render(list){

catalog.innerHTML = ""

list.forEach(wine=>{

catalog.innerHTML += `

<div class="wine-card">

<img src="${wine.img}">

<h3>${wine.name}</h3>

<div class="wine-meta">
${wine.country}
</div>

<div class="wine-price">
${wine.price} ₽
</div>

<button class="btn">
Спросить сомелье
</button>

</div>

`

})

}


function update(){

let list = [...wines]


const text = search.value.toLowerCase()

if(text){

list = list.filter(w =>
w.name.toLowerCase().includes(text)
)

}


const type = filter.value

if(type !== "all"){

list = list.filter(w =>
w.type === type
)

}


const sortValue = sort.value

if(sortValue === "price_low"){

list.sort((a,b)=>a.price-b.price)

}

if(sortValue === "price_high"){

list.sort((a,b)=>b.price-a.price)

}


render(list)

}


search.oninput = update
filter.onchange = update
sort.onchange = update


render(wines)

</script>


</body>
</html>
