name: Generate images.json

on:
  push:
    paths:
      - 'assets/wines/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Debug files (проверка)
        run: |
          echo "=== LIST FILES ==="
          ls -R assets || true

      - name: Generate images.json
        run: |
          mkdir -p data
          echo "[" > data/images.json

          for file in assets/wines/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              if [ "$filename" != ".keep" ]; then
                echo "  \"$filename\"," >> data/images.json
              fi
            fi
          done

          sed -i '$ s/,$//' data/images.json
          echo "]" >> data/images.json

      - name: Show result
        run: |
          echo "=== RESULT ==="
          cat data/images.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/images.json
          git commit -m "auto: update images.json" || echo "no changes"
          git push
