name: Generate images.json

on:
  push:
    paths:
      - 'assets/wines/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate images.json
        run: |
          mkdir -p data

          echo "[" > data/images.json

          find assets/wines -type f ! -name ".keep" | sort | while IFS= read -r file
          do
            filename=$(basename "$file")
            echo "  \"$filename\"," >> data/images.json
          done

          sed -i '$ s/,$//' data/images.json

          echo "]" >> data/images.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/images.json
          git commit -m "auto: update images.json" || echo "no changes"
          git push
