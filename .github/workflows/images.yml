name: Generate images.json

on:
  push:
    paths:
      - 'assets/wines/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate images.json
        run: |
          mkdir -p data
          echo "[" > data/images.json

          find assets/wines -type f ! -name ".keep" | while read file; do
            filename=$(basename "$file")
            echo "  \"$filename\"," >> data/images.json
          done

          # убрать запятую у последнего элемента
          sed -i '$ s/,$//' data/images.json

          echo "]" >> data/images.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/images.json
          git commit -m "auto: update images.json" || echo "no changes"
          git push
