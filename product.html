<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Вино — Винотека</title>

<link rel="stylesheet" href="/styles.css">

<style>

.productPage{
max-width:1200px;
margin:60px auto;
padding:40px;
display:grid;
grid-template-columns:420px 1fr;
gap:60px;
}

.productImage{
background:#132933;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
}

.productImage img{
max-height:420px;
object-fit:contain;
}

.wine-en{
font-size:14px;
letter-spacing:1px;
color:#9bb7c4;
margin-bottom:6px;
text-transform:uppercase;
}

.productInfo h1{
font-size:28px;
margin-bottom:16px;
}

.productStyle{
color:#9bb7c4;
margin-bottom:20px;
font-size:16px;
}

.productPrice{
font-size:28px;
font-weight:700;
margin-bottom:20px;
}

.productButton{
display:inline-block;
background:#b879ff;
padding:12px 20px;
border-radius:10px;
text-decoration:none;
color:white;
}

.similarTitle{
max-width:1200px;
margin:40px auto 20px;
font-size:22px;
padding-left:40px;
}

.similarGrid{
max-width:1200px;
margin:0 auto 80px;
padding:0 40px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:28px;
}

</style>

</head>

ВИНОТЕКА
</div>

</header>

</div>

<div id="productNameEn" class="wine-en"></div>

<h1 id="productName"></h1>

<div id="productStyle" class="productStyle"></div>

<div id="productPrice" class="productPrice"></div>

<a href="https://t.me/vinotekakaram" class="productButton">
Спросить сомелье
</a>

</div>

</main>

<h2 class="similarTitle">
Похожие товары
</h2>

<div id="similarGrid" class="similarGrid"></div>

if(cat === "wine") return "Вино"

if(cat === "beer") return "Пиво"

if(cat === "grocery") return "Бакалея"

return cat

}
