<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<title>Импорт каталога</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
padding:40px;
}

button{
padding:12px 20px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Импорт каталога из Excel</h2>

<input type="file" id="file">

<br><br>

<button onclick="processFile()">
Создать products.json
</button>


<script>

function cleanName(name){

if(!name) return ""

let cleaned = name

cleaned = cleaned
.replace(/вино/gi,"")
.replace(/сортовое/gi,"")
.replace(/марочное/gi,"")
.replace(/столовое/gi,"")

.replace(/белое/gi,"")
.replace(/красное/gi,"")
.replace(/розовое/gi,"")

.replace(/сухое/gi,"")
.replace(/полусухое/gi,"")
.replace(/полусладкое/gi,"")
.replace(/сладкое/gi,"")

cleaned = cleaned.replace(/\s+/g," ").trim()

return cleaned

}

function detectCategory(name){

name = name.toLowerCase()

if(name.includes("вино")) return "wine"
if(name.includes("игрист")) return "sparkling"
if(name.includes("шамп")) return "champagne"

if(name.includes("виски")) return "whisky"
if(name.includes("коньяк")) return "cognac"
if(name.includes("бренди")) return "brandy"
if(name.includes("джин")) return "gin"
if(name.includes("ром")) return "rum"
if(name.includes("ликер")) return "liqueur"
if(name.includes("водка")) return "vodka"

return "other"

}

function processFile(){

const file =
document.getElementById("file").files[0]

const reader =
new FileReader()

reader.onload = function(e){

const data =
new Uint8Array(e.target.result)

const workbook =
XLSX.read(data,{type:"array"})

const sheet =
workbook.Sheets[workbook.SheetNames[0]]

const rows =
XLSX.utils.sheet_to_json(sheet)

const products = []

let id = 1

rows.forEach(row => {

const name = row["Товар"]
const qty = row["Количество"]
const price = row["Цена"]

if(!name) return
if(qty <= 0) return

products.push({

id: id++,

category: detectCategory(name),

name: cleanName(name),

price: price

})

})

const blob =
new Blob(
[JSON.stringify(products,null,2)],
{type:"application/json"}
)

const a =
document.createElement("a")

a.href =
URL.createObjectURL(blob)

a.download =
"products.json"

a.click()

}

reader.readAsArrayBuffer(file)

}

</script>

</body>
</html>
