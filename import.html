<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<title>Импорт каталога</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
padding:40px;
background:#0b0f14;
color:white;
}

button{
padding:14px 22px;
font-size:16px;
cursor:pointer;
background:#c9a86a;
border:none;
border-radius:6px;
}

input{
margin-top:20px;
margin-bottom:20px;
}

</style>

</head>

<body>

<h2>Импорт каталога из Excel</h2>

<input type="file" id="fileInput">

<br>

<button id="btn">Создать products.json</button>


<script>

document.getElementById("btn").onclick = function(){

const file =
document.getElementById("fileInput").files[0]

if(!file){
alert("Выберите Excel файл")
return
}

const reader = new FileReader()

reader.onload = function(e){

const data = new Uint8Array(e.target.result)

const workbook =
XLSX.read(data,{type:"array"})

const sheet =
workbook.Sheets[workbook.SheetNames[0]]

const rows =
XLSX.utils.sheet_to_json(sheet)

const products = []

let id = 1

for(let row of rows){

const name = row["Товар"]
const price = row["Цена за единицу"]

if(!name) continue

products.push({

id:id++,
name:name,
price:price

})

}

const json =
JSON.stringify(products,null,2)

const blob =
new Blob([json],{type:"application/json"})

const link =
document.createElement("a")

link.href =
URL.createObjectURL(blob)

link.download =
"products.json"

link.click()

}

reader.readAsArrayBuffer(file)

}

</script>

</body>
</html>
