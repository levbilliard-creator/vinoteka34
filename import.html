<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<title>Импорт каталога из Excel</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
padding:40px;
background:#0b0f14;
color:white;
}

button{
padding:14px 22px;
font-size:16px;
cursor:pointer;
background:#c9a86a;
border:none;
border-radius:6px;
margin-top:20px;
}

input{
margin-top:20px;
margin-bottom:10px;
}

</style>

</head>

<body>

<h2>Импорт каталога из Excel</h2>

<input type="file" id="fileInput">

<br>

<button onclick="processFile()">Создать products.json</button>

<script>

function processFile(){

const file =
document.getElementById("fileInput").files[0]

if(!file){

alert("Выберите Excel файл")
return

}

const reader = new FileReader()

reader.onload = function(e){

const data =
new Uint8Array(e.target.result)

const workbook =
XLSX.read(data,{type:"array"})

const sheet =
workbook.Sheets[workbook.SheetNames[0]]

const rows =
XLSX.utils.sheet_to_json(sheet,{
range:9,
defval:""
})

console.log("Найдено строк:",rows.length)

const products = []

let id = 1

rows.forEach(row => {

const name = row["Товар"]
const price = row["Цена"]

if(!name) return

products.push({

id:id++,
name:name,
price:price

})

})

console.log("Товаров:",products.length)

const json =
JSON.stringify(products,null,2)

const blob =
new Blob([json],{type:"application/json"})

const link =
document.createElement("a")

link.href =
URL.createObjectURL(blob)

link.download =
"products.json"

link.click()

}

reader.readAsArrayBuffer(file)

}

</script>

</body>
</html>
