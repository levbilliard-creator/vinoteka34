```html
<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VINOTEKA34</title>

<link rel="stylesheet" href="/styles.css">

<style>

.hero{
position:relative;
height:70vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.45);
}

.heroContent{
position:relative;
z-index:2;
color:white;
animation:fadeUp 1.4s ease;
}

.heroTitle{
font-size:52px;
font-weight:700;
margin-bottom:16px;
}

.heroSubtitle{
font-size:22px;
margin-bottom:16px;
}

.heroText{
font-size:16px;
opacity:0.9;
margin-bottom:28px;
}

.heroButton{
display:inline-block;
padding:14px 26px;
background:#b879ff;
color:white;
border-radius:10px;
text-decoration:none;
font-weight:600;
transition:0.2s;
}

.heroButton:hover{
background:#c996ff;
transform:translateY(-2px);
}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.section{
max-width:1200px;
margin:80px auto;
padding:0 40px;
}

.section h2{
font-size:32px;
margin-bottom:30px;
}

.categories{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:24px;
}

.categoryCard{
background:#132933;
padding:30px;
border-radius:14px;
text-align:center;
transition:0.2s;
cursor:pointer;
}

.categoryCard:hover{
background:#183845;
transform:translateY(-4px);
}

.categoryCard h3{
margin-top:12px;
font-size:18px;
}

</style>

</head>

<body>

<header class="header">

<div class="logo">
VINOTEKA34
</div>

<nav class="menu">
<a href="/">Главная</a>
<a href="/catalog">Каталог</a>
<a href="#">Дегустации</a>
<a href="#">Контакты</a>
</nav>

</header>


<section class="hero">

<video autoplay muted loop playsinline>

<source src="/hero.mp4" type="video/mp4">

</video>

<div class="heroContent">

<div class="heroTitle">
VINOTEKA34
</div>

<div class="heroSubtitle">
Винный бутик<br>
и клуб сомелье
</div>

<div class="heroText">
Более 500 вин со всего мира.<br>
Подбор вина и дегустации.
</div>

<a href="/catalog" class="heroButton">
Смотреть каталог
</a>

</div>

</section>


<section class="section">

<h2>Категории</h2>

<div class="categories">

<div class="categoryCard" onclick="location.href='/catalog?cat=wine'">
🍷
<h3>Вино</h3>
</div>

<div class="categoryCard" onclick="location.href='/catalog?cat=sparkling'">
🥂
<h3>Игристое</h3>
</div>

<div class="categoryCard" onclick="location.href='/catalog?cat=strong'">
🥃
<h3>Крепкий алкоголь</h3>
</div>

<div class="categoryCard" onclick="location.href='/catalog?cat=beer'">
🍺
<h3>Пиво</h3>
</div>

</div>

</section>


</body>
</html>
```
